<script>

};

function tc(t,o){return t.replace("{op}",o);}

var engineMap={love:"rain",confession:"rain",birthday:"petals",friendship:"fireflies",apology:"stars",proposal:"petals"};

var canvas=document.getElementById("canvas");
var ctx=canvas.getContext("2d");
var W,H;
function resizeCanvas(){W=canvas.width=window.innerWidth;H=canvas.height=window.innerHeight;}
window.addEventListener("resize",resizeCanvas);
resizeCanvas();

function buildRain(th){
  var drops={far:[],mid:[],near:[]};
  for(var i=0;i<55;i++) drops.far.push({x:Math.random()*W,y:Math.random()*H,len:Math.random()*14+8,speed:Math.random()*1.5+1,op:Math.random()*0.25+0.08,wx:Math.random()*0.3+0.1});
  for(var i=0;i<35;i++) drops.mid.push({x:Math.random()*W,y:Math.random()*H,len:Math.random()*18+12,speed:Math.random()*2+2,op:Math.random()*0.35+0.15,wx:Math.random()*0.5+0.2});
  for(var i=0;i<18;i++) drops.near.push({x:Math.random()*W,y:Math.random()*H,len:Math.random()*22+16,speed:Math.random()*2.5+3.5,op:Math.random()*0.45+0.25,wx:Math.random()*0.8+0.3});
  var lt={active:false,op:0,x:0,phase:"",timer:0,next:280+Math.random()*400};
  function drawLayer(arr,color,thick){ctx.lineWidth=thick;for(var i=0;i<arr.length;i++){var d=arr[i];ctx.strokeStyle=tc(color,d.op);ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x+d.wx*d.len*0.3,d.y+d.len);ctx.stroke();d.y+=d.speed;d.x+=d.wx*0.4;if(d.y>H+d.len){d.y=-d.len;d.x=Math.random()*W;}if(d.x>W+20)d.x=-10;}}
  return function(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);
    var tg=ctx.createLinearGradient(0,0,0,H*0.4);tg.addColorStop(0,"rgba(0,0,0,0.3)");tg.addColorStop(1,"rgba(0,0,0,0)");ctx.fillStyle=tg;ctx.fillRect(0,0,W,H*0.4);
    drawLayer(drops.far,th.rain.far,0.6);drawLayer(drops.mid,th.rain.mid,0.9);drawLayer(drops.near,th.rain.near,1.4);
    var fg=ctx.createLinearGradient(0,H*0.65,0,H);fg.addColorStop(0,tc(th.rain.fog,0));fg.addColorStop(0.5,tc(th.rain.fog,0.18));fg.addColorStop(1,tc(th.rain.fog,0.45));ctx.fillStyle=fg;ctx.fillRect(0,H*0.65,W,H*0.35);
    lt.timer++;if(lt.timer>=lt.next&&!lt.active){lt.active=true;lt.op=0;lt.x=W*0.2+Math.random()*W*0.6;lt.phase="in";}
    if(lt.active){if(lt.phase==="in"){lt.op+=0.18;if(lt.op>=1){lt.op=1;lt.phase="out";}}else{lt.op-=0.06;if(lt.op<=0){lt.op=0;lt.active=false;lt.timer=0;lt.next=280+Math.random()*400;}}var lg=ctx.createRadialGradient(lt.x,0,0,lt.x,0,H*0.8);lg.addColorStop(0,tc(th.rain.lightning,lt.op*0.25));lg.addColorStop(0.4,tc(th.rain.lightning,lt.op*0.08));lg.addColorStop(1,tc(th.rain.lightning,0));ctx.fillStyle=lg;ctx.fillRect(0,0,W,H);}
  };
}

function buildPetals(th){
  var petals=[];
  function randC(){var r=Math.random();if(r<0.45)return th.petals.a;if(r<0.8)return th.petals.b;return th.petals.c;}
  function makePetal(rand){return{x:rand?Math.random()*W:Math.random()*W,y:rand?Math.random()*H:-30,w:Math.random()*10+6,h:Math.random()*18+10,rot:Math.random()*Math.PI*2,rotSpeed:(Math.random()-0.5)*0.025,vy:Math.random()*0.9+0.4,vx:Math.random()*0.6-0.3,swayAmp:Math.random()*1.2+0.4,swaySpeed:Math.random()*0.025+0.008,swayOff:Math.random()*Math.PI*2,op:Math.random()*0.55+0.25,color:randC()};}
  for(var i=0;i<38;i++) petals.push(makePetal(true));
  var t=0;
  return function(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);
    var vg=ctx.createRadialGradient(W/2,H/2,H*0.3,W/2,H/2,H*0.85);vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(1,"rgba(0,0,0,0.55)");ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    t+=0.012;
    for(var i=0;i<petals.length;i++){
      var p=petals[i];ctx.save();ctx.translate(p.x,p.y);ctx.rotate(p.rot);
      ctx.beginPath();ctx.moveTo(0,-p.h/2);ctx.bezierCurveTo(p.w*0.8,-p.h*0.2,p.w*0.8,p.h*0.2,0,p.h/2);ctx.bezierCurveTo(-p.w*0.8,p.h*0.2,-p.w*0.8,-p.h*0.2,0,-p.h/2);ctx.closePath();
      ctx.fillStyle=tc(p.color,p.op);ctx.fill();
      ctx.beginPath();ctx.moveTo(0,-p.h/2+2);ctx.lineTo(0,p.h/2-2);ctx.strokeStyle=tc(p.color,p.op*0.3);ctx.lineWidth=0.5;ctx.stroke();
      ctx.restore();
      p.y+=p.vy;p.x+=p.vx+Math.sin(t*p.swaySpeed*60+p.swayOff)*p.swayAmp*0.12;p.rot+=p.rotSpeed;
      if(p.y>H+30) petals[i]=makePetal(false);
    }
  };
}

function buildFireflies(th){
  var flies=[],traveller=null,tTimer=0,tNext=220;
  function makeFly(rand){return{x:rand?Math.random()*W:Math.random()*W,y:rand?Math.random()*H:Math.random()*H,r:Math.random()*2.2+1.2,cx:Math.random()*W,cy:Math.random()*H,orbitR:Math.random()*60+30,orbitSpeed:(Math.random()*0.008+0.004)*(Math.random()<0.5?1:-1),angle:Math.random()*Math.PI*2,pulseSpeed:Math.random()*0.04+0.02,pulseOff:Math.random()*Math.PI*2,baseOp:Math.random()*0.5+0.3};}
  for(var i=0;i<24;i++) flies.push(makeFly(true));
  var t=0,c=th.ff.core,g=th.ff.glow;
  return function(){
    ctx.clearRect(0,0,W,H);ctx.fillStyle=th.bg;ctx.fillRect(0,0,W,H);
    var vg=ctx.createRadialGradient(W/2,H/2,H*0.25,W/2,H/2,H*0.85);vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(1,"rgba(0,0,0,0.65)");ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    t+=0.01;
    for(var i=0;i<flies.length;i++){
      var f=flies[i];f.angle+=f.orbitSpeed;f.x=f.cx+Math.cos(f.angle)*f.orbitR+Math.sin(f.angle*0.7)*f.orbitR*0.4;f.y=f.cy+Math.sin(f.angle)*f.orbitR+Math.cos(f.angle*0.5)*f.orbitR*0.3;
      var pulse=0.5+0.5*Math.sin(t*f.pulseSpeed*60+f.pulseOff),op=f.baseOp*(0.3+0.7*pulse);
      var grad=ctx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*14);grad.addColorStop(0,"rgba("+c[0]+","+c[1]+","+c[2]+","+(op*0.9)+")");grad.addColorStop(0.2,"rgba("+c[0]+","+c[1]+","+c[2]+","+(op*0.5)+")");grad.addColorStop(0.5,"rgba("+g[0]+","+g[1]+","+g[2]+","+(op*0.18)+")");grad.addColorStop(1,"rgba("+g[0]+","+g[1]+","+g[2]+",0)");
      ctx.beginPath();ctx.arc(f.x,f.y,f.r*14,0,Math.PI*2);ctx.fillStyle=grad;ctx.fill();ctx.beginPath();ctx.arc(f.x,f.y,f.r,0,Math.PI*2);ctx.fillStyle="rgba("+c[0]+","+c[1]+","+c[2]+","+op+")";ctx.fill();
    }
    tTimer++;if(tTimer>=tNext&&!traveller){var sx=Math.random()<0.5?-10:W+10,sy=H*0.15+Math.random()*H*0.7,ang=sx<0?(Math.random()*0.6-0.3):(Math.PI+Math.random()*0.6-0.3),spd=0.8+Math.random()*0.6;traveller={x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:320,maxLife:320};tTimer=0;tNext=300+Math.random()*400;}
    if(traveller){traveller.x+=traveller.vx;traveller.y+=traveller.vy;traveller.life--;var lr=traveller.life/traveller.maxLife,op=lr*0.85;for(var j=0;j<8;j++){var tx=traveller.x-traveller.vx*(j*1.2),ty=traveller.y-traveller.vy*(j*1.2),to=op*(1-j/8)*0.6,tr=1.8*(1-j/8);if(to<0.01||tr<0.2)continue;var tg=ctx.createRadialGradient(tx,ty,0,tx,ty,tr*8);tg.addColorStop(0,"rgba("+c[0]+","+c[1]+","+c[2]+","+to+")");tg.addColorStop(1,"rgba("+g[0]+","+g[1]+","+g[2]+",0)");ctx.beginPath();ctx.arc(tx,ty,tr*8,0,Math.PI*2);ctx.fillStyle=tg;ctx.fill();}ctx.beginPath();ctx.arc(traveller.x,traveller.y,3,0,Math.PI*2);ctx.fillStyle="rgba("+c[0]+","+c[1]+","+c[2]+","+op+")";ctx.fill();if(traveller.life<=0)traveller=null;}
  };
}

function buildStars(th){
  var stars=[],shooters=[],shTimer=0,shNext=350;
  var sc=th.stars;
  for(var i=0;i<90;i++){var isMilky=Math.random()<0.35,s={x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.4+0.2,baseOp:Math.random()*0.6+0.15,pulseSpeed:Math.random()*0.03+0.005,pulseOff:Math.random()*Math.PI*2,warm:Math.random()<0.55,isMilky:isMilky};if(isMilky){var band=Math.random();s.x=W*0.8-band*W*0.9+(Math.random()-0.5)*W*0.18;s.y=band*H+(Math.random()-0.5)*H*0.18;s.r=Math.random()*0.8+0.15;s.baseOp=Math.random()*0.35+0.08;}stars.push(s);}
  var t=0;
  return function(){
    ctx.clearRect(0,0,W,H);
    var bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,sc.bg2);bg.addColorStop(1,th.bg);ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    var vg=ctx.createRadialGradient(W/2,H*0.4,H*0.2,W/2,H*0.4,H*0.9);vg.addColorStop(0,"rgba(0,0,0,0)");vg.addColorStop(1,"rgba(0,0,0,0.6)");ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
    t+=0.01;
    for(var i=0;i<stars.length;i++){
      var s=stars[i];var pulse=0.5+0.5*Math.sin(t*s.pulseSpeed*60+s.pulseOff);var op=s.baseOp*(0.4+0.6*pulse);
      var c=s.isMilky?sc.milky:(s.warm?sc.warm:sc.cool);
      if(s.r>0.9&&!s.isMilky){var sg=ctx.createRadialGradient(s.x,s.y,0,s.x,s.y,s.r*6);sg.addColorStop(0,"rgba("+c[0]+","+c[1]+","+c[2]+","+(op*0.4)+")");sg.addColorStop(1,"rgba("+c[0]+","+c[1]+","+c[2]+",0)");ctx.beginPath();ctx.arc(s.x,s.y,s.r*6,0,Math.PI*2);ctx.fillStyle=sg;ctx.fill();}
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle="rgba("+c[0]+","+c[1]+","+c[2]+","+op+")";ctx.fill();
    }
    shTimer++;if(shTimer>=shNext&&shooters.length<2){var sx=W*0.1+Math.random()*W*0.6,sy=H*0.05+Math.random()*H*0.25,ang=Math.PI/5+Math.random()*Math.PI/8,spd=4+Math.random()*3;shooters.push({x:sx,y:sy,vx:Math.cos(ang)*spd,vy:Math.sin(ang)*spd,life:90,maxLife:90,trail:[]});shTimer=0;shNext=350+Math.random()*500;}
    for(var i=shooters.length-1;i>=0;i--){var sh=shooters[i];sh.trail.push({x:sh.x,y:sh.y});if(sh.trail.length>18)sh.trail.shift();sh.x+=sh.vx;sh.y+=sh.vy;sh.life--;var lr=sh.life/sh.maxLife,sc2=th.stars.shoot;for(var j=0;j<sh.trail.length;j++){var tp=sh.trail[j],tr=sh.trail.length,tratio=j/tr,top=lr*tratio*0.9,trr=1.8*tratio;if(top<0.01)continue;ctx.beginPath();ctx.arc(tp.x,tp.y,trr,0,Math.PI*2);ctx.fillStyle="rgba("+sc2[0]+","+sc2[1]+","+sc2[2]+","+top+")";ctx.fill();}var hg=ctx.createRadialGradient(sh.x,sh.y,0,sh.x,sh.y,4);hg.addColorStop(0,"rgba("+sc2[0]+","+sc2[1]+","+sc2[2]+","+(lr*0.95)+")");hg.addColorStop(1,"rgba("+sc2[0]+","+sc2[1]+","+sc2[2]+",0)");ctx.beginPath();ctx.arc(sh.x,sh.y,4,0,Math.PI*2);ctx.fillStyle=hg;ctx.fill();if(sh.life<=0)shooters.splice(i,1);}
  };
}

function buildAurora(th){
  var s1=[],s2=[],s3=[],inited=false;
  var curtains=[

function loadExperience(){
function loadExperience(){
  var params=new URLSearchParams(window.location.search);
  var slug=params.get("id");
  if(!slug){showExpired();return;}
  fetch(SURL+"/rest/v1/experiences?slug=eq."+slug+"&select=*",{headers:{"apikey":SKEY,"Authorization":"Bearer "+SKEY}})
  .then(function(r){return r.json();})
  .then(function(data){
    if(!data||data.length===0){showExpired();return;}
    var exp=data[0];
    if(!exp.is_active){showExpired();return;}
    if(exp.expires_at&&new Date()>new Date(exp.expires_at)){showExpired();return;}
    fetch(SURL+"/rest/v1/experiences?id=eq."+exp.id,{method:"PATCH",headers:{"apikey":SKEY,"Authorization":"Bearer "+SKEY,"Content-Type":"application/json"},body:JSON.stringify({view_count:(exp.view_count||0)+1})});
    setTimeout(function(){init(exp);},1800);
  })
  .catch(function(){showExpired();});
});

function init(exp){
  var loading=document.getElementById("loading");
  loading.classList.add("gone");
  setTimeout(function(){loading.style.display="none";},900);

  var themeName=exp.theme||"andhera";
  if(!THEMES[themeName]) themeName="andhera";
  var th=THEMES[themeName];
  document.body.style.background=th.bg;

  var engineKey=engineMap[exp.occasion]||"stars";
  if(themeName==="parchhain") engineKey="aurora";

  var drawFrame;
  if(engineKey==="rain") drawFrame=buildRain(th);
  else if(engineKey==="petals") drawFrame=buildPetals(th);
  else if(engineKey==="fireflies") drawFrame=buildFireflies(th);
  else if(engineKey==="aurora") drawFrame=buildAurora(th);
  else drawFrame=buildStars(th);

  function loop(){drawFrame();requestAnimationFrame(loop);}
  requestAnimationFrame(loop);

  document.getElementById("from-line").textContent="For "+exp.receiver_name;
  document.getElementById("sender-name").textContent=exp.sender_name;

  if(exp.is_premium){
    document.getElementById("watermark").style.display="none";
  }

  var s1=document.getElementById("s1");
  var s2=document.getElementById("s2");
  var s3=document.getElementById("s3");

  s1.addEventListener("click",function(){
    s1.classList.remove("active");

    setTimeout(function(){
      s2.classList.add("active");
      revealWords(exp.message);
    },600);
  });

  document.getElementById("next-btn").addEventListener("click",function(){
    s2.classList.remove("active");
    setTimeout(function(){s3.classList.add("active");},600);
  });
}



function revealWords(text){
  var el=document.getElementById("msg-text");
  var words=text.split(" ");
  el.innerHTML="";
  words.forEach(function(w,i){
    var span=document.createElement("span");
    span.className="word";
    span.textContent=w;
    el.appendChild(span);
    el.appendChild(document.createTextNode(" "));
    setTimeout(function(){span.classList.add("show");},i*80);
  });
}

function showExpired(){
  document.getElementById("loading").style.display="none";
  document.getElementById("expired").style.display="flex";
}
